<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maqam — لكل مجتهد مقام</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Noto+Naskh+Arabic:wght@700;800;900&display=swap" rel="stylesheet">
<script>window.MathJax={tex:{inlineMath:[["\\(","\\)"]],displayMath:[["\\[","\\]"]]},options:{skipHtmlTags:["script","noscript","style","textarea"]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--navy:#1a2f5e;--navy-dark:#111f3f;--navy-light:#e8edf8;--navy-lighter:#f0f4fc;
--orange:#e05c00;--orange-light:#fff0e6;
--gold:#d4900a;--gold-light:#fdf3e0;
--green:#15803d;--green-light:#dcfce7;--green-dark:#166534;
--red:#b91c1c;--red-light:#fee2e2;--red-dark:#991b1b;
--cyan:#0e7490;--yellow-light:#fefce8;--gray-light:#f3f4f6;
--bg:#f4f6fb;--white:#fff;--surface:#eaecf5;
--border:#d0d7ea;--text:#1a2f5e;--text2:#4a5578;--text3:#8492b0;
--sh:0 1px 3px rgba(26,47,94,.08);--sh2:0 4px 16px rgba(26,47,94,.10);--sh3:0 12px 40px rgba(26,47,94,.15);
--r:18px;--rs:12px;--rx:8px}
html{scroll-behavior:smooth}
body{font-family:"Tajawal",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh;flex-direction:column}.page.active{display:flex}
@keyframes fU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes sp{to{transform:rotate(360deg)}}

/* LOADING */
#ls{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .5s}
#ls.hide{opacity:0;pointer-events:none}
.ls-logo{font-family:"Noto Naskh Arabic",serif;font-size:68px;font-weight:900;color:#fff;line-height:1}
.ls-en{font-size:10px;letter-spacing:6px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:-4px}
.ls-spin{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.18);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}

/* NAV */
nav{position:fixed;top:0;right:0;left:0;z-index:200;height:56px;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--sh);display:grid;grid-template-columns:48px 1fr 48px;align-items:center;padding:0 10px}
.nv-menu{width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.nv-menu span{display:block;width:14px;height:2px;background:var(--text2);border-radius:2px}
.nv-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.nv-logo{font-family:"Noto Naskh Arabic",serif;font-size:18px;font-weight:900;color:var(--navy);line-height:1}
.nv-logo-en{font-size:6px;letter-spacing:4px;color:var(--text3);text-transform:uppercase}
.nv-user{display:none;flex-direction:column;align-items:center;line-height:1.3}
.nv-uname{font-size:11px;font-weight:800;color:var(--navy);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nv-uschool{font-size:9px;color:var(--text3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nv-back{display:none;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:transparent;cursor:pointer;font-size:16px;color:var(--text2);justify-self:end}
.nv-back.show{display:flex}

/* DRAWER */
.drw-ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.27);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.drw-ov.open{opacity:1;pointer-events:all}
.drw{position:fixed;top:0;right:0;width:min(285px,88vw);height:100vh;background:var(--white);box-shadow:var(--sh3);z-index:400;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto}
.drw.open{transform:translateX(0)}
.drw-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drw-logo{font-family:"Noto Naskh Arabic",serif;font-size:16px;font-weight:900;color:var(--navy)}
.drw-logo small{font-size:7px;display:block;letter-spacing:4px;color:var(--text3);text-transform:uppercase}
.drw-close{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.drw-user{padding:10px 16px;background:var(--navy)}
.drw-uname{font-size:13px;font-weight:800;color:white}
.drw-umeta{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.drw-sec-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.drw-tab{padding:7px;border-radius:7px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:"Tajawal",sans-serif;font-size:11px;font-weight:700;color:var(--text2);text-align:center;transition:.2s}
.drw-tab.active{background:var(--navy);color:white;border-color:var(--navy)}
.drw-nav{padding:4px 0}
.drw-item{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;border:none;background:transparent;width:100%;text-align:right;font-family:"Tajawal",sans-serif;font-size:13px;font-weight:500;color:var(--text2);border-right:3px solid transparent;transition:.18s}
.drw-item:hover{background:var(--surface)}
.drw-item.active{background:var(--navy-lighter);color:var(--navy);border-right-color:var(--navy);font-weight:700}
.drw-item.danger{color:var(--red)}.drw-item.danger:hover{background:var(--red-light)}
.drw-item.wa{color:#16a34a}.drw-item.wa:hover{background:var(--green-light)}
.drw-ic{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.drw-foot{padding:8px 16px;border-top:1px solid var(--border);text-align:center;font-size:9px;color:var(--text3);margin-top:auto}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--rs);font-family:"Tajawal",sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--navy);color:white}.btn-primary:hover:not(:disabled){background:var(--navy-dark)}
.btn-outline{background:white;color:var(--navy);border:2px solid var(--navy)}.btn-outline:hover:not(:disabled){background:var(--navy-lighter)}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover:not(:disabled){background:var(--border)}
.btn-green{background:var(--green);color:white}.btn-green:hover:not(:disabled){background:var(--green-dark)}
.btn-red{background:var(--red);color:white}.btn-red:hover:not(:disabled){background:var(--red-dark)}
.btn-block{width:100%}.btn-sm{padding:6px 12px;font-size:11px;border-radius:var(--rx)}.btn-lg{padding:12px 28px;font-size:15px;border-radius:var(--r)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* FORMS */
.fg{margin-bottom:11px}.fl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.fi{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);font-family:"Tajawal",sans-serif;font-size:13px;color:var(--text);outline:none;transition:.2s}
.fi:focus{border-color:var(--navy);background:white}.fi::placeholder{color:var(--text3)}
select.fi{cursor:pointer}

/* HOME */
.home-body{flex:1;padding-top:56px}
.hero{background:var(--navy);padding:48px 18px 36px;text-align:center;position:relative;overflow:hidden}
.hero-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
.hero-content{position:relative;z-index:2}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:100px;padding:4px 11px;font-size:10px;font-weight:700;color:rgba(255,255,255,.78);margin-bottom:16px;animation:fU .5s ease both}
.hero-logo{font-family:"Noto Naskh Arabic",serif;font-size:clamp(68px,15vw,108px);font-weight:900;color:white;line-height:1;animation:fU .5s .05s ease both}
.hero-logo-en{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.28);font-weight:600;display:block;margin-top:4px;text-transform:uppercase;animation:fU .5s .1s ease both}
.hero-tag{font-size:clamp(14px,3vw,20px);font-weight:800;color:var(--gold);margin:14px 0 8px;animation:fU .5s .15s ease both}
.hero-desc{font-size:13px;color:rgba(255,255,255,.6);max-width:320px;margin:0 auto 24px;line-height:1.9;animation:fU .5s .2s ease both}
