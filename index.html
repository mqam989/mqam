
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maqam — لكل مجتهد مقام</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Noto+Naskh+Arabic:wght@700;800;900&display=swap" rel="stylesheet">
<script>window.MathJax={tex:{inlineMath:[["\\(","\\)"]],displayMath:[["\\[","\\]"]]},options:{skipHtmlTags:["script","noscript","style","textarea"]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--navy:#1a2f5e;--navy-dark:#111f3f;--navy-light:#e8edf8;--navy-lighter:#f0f4fc;
--orange:#e05c00;--orange-light:#fff0e6;
--gold:#d4900a;--gold-light:#fdf3e0;
--green:#15803d;--green-light:#dcfce7;--green-dark:#166534;
--red:#b91c1c;--red-light:#fee2e2;--red-dark:#991b1b;
--cyan:#0e7490;--yellow-light:#fefce8;--gray-light:#f3f4f6;
--bg:#f4f6fb;--white:#fff;--surface:#eaecf5;
--border:#d0d7ea;--text:#1a2f5e;--text2:#4a5578;--text3:#8492b0;
--sh:0 1px 3px rgba(26,47,94,.08);--sh2:0 4px 16px rgba(26,47,94,.10);--sh3:0 12px 40px rgba(26,47,94,.15);
--r:18px;--rs:12px;--rx:8px}
html{scroll-behavior:smooth}
body{font-family:"Tajawal",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh;flex-direction:column}.page.active{display:flex}
@keyframes fU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes sp{to{transform:rotate(360deg)}}

/* LOADING */
#ls{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .5s}
#ls.hide{opacity:0;pointer-events:none}
.ls-logo{font-family:"Noto Naskh Arabic",serif;font-size:68px;font-weight:900;color:#fff;line-height:1}
.ls-en{font-size:10px;letter-spacing:6px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:-4px}
.ls-spin{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.18);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}

/* NAV */
nav{position:fixed;top:0;right:0;left:0;z-index:200;height:56px;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--sh);display:grid;grid-template-columns:48px 1fr 48px;align-items:center;padding:0 10px}
.nv-menu{width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.nv-menu span{display:block;width:14px;height:2px;background:var(--text2);border-radius:2px}
.nv-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.nv-logo{font-family:"Noto Naskh Arabic",serif;font-size:18px;font-weight:900;color:var(--navy);line-height:1}
.nv-logo-en{font-size:6px;letter-spacing:4px;color:var(--text3);text-transform:uppercase}
.nv-user{display:none;flex-direction:column;align-items:center;line-height:1.3}
.nv-uname{font-size:11px;font-weight:800;color:var(--navy);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nv-uschool{font-size:9px;color:var(--text3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nv-back{display:none;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:transparent;cursor:pointer;font-size:16px;color:var(--text2);justify-self:end}
.nv-back.show{display:flex}

/* DRAWER */
.drw-ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.27);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.drw-ov.open{opacity:1;pointer-events:all}
.drw{position:fixed;top:0;right:0;width:min(285px,88vw);height:100vh;background:var(--white);box-shadow:var(--sh3);z-index:400;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto}
.drw.open{transform:translateX(0)}
.drw-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drw-logo{font-family:"Noto Naskh Arabic",serif;font-size:16px;font-weight:900;color:var(--navy)}
.drw-logo small{font-size:7px;display:block;letter-spacing:4px;color:var(--text3);text-transform:uppercase}
.drw-close{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.drw-user{padding:10px 16px;background:var(--navy)}
.drw-uname{font-size:13px;font-weight:800;color:white}
.drw-umeta{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.drw-sec-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.drw-tab{padding:7px;border-radius:7px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:"Tajawal",sans-serif;font-size:11px;font-weight:700;color:var(--text2);text-align:center;transition:.2s}
.drw-tab.active{background:var(--navy);color:white;border-color:var(--navy)}
.drw-nav{padding:4px 0}
.drw-item{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;border:none;background:transparent;width:100%;text-align:right;font-family:"Tajawal",sans-serif;font-size:13px;font-weight:500;color:var(--text2);border-right:3px solid transparent;transition:.18s}
.drw-item:hover{background:var(--surface)}
.drw-item.active{background:var(--navy-lighter);color:var(--navy);border-right-color:var(--navy);font-weight:700}
.drw-item.danger{color:var(--red)}.drw-item.danger:hover{background:var(--red-light)}
.drw-item.wa{color:#16a34a}.drw-item.wa:hover{background:var(--green-light)}
.drw-ic{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.drw-foot{padding:8px 16px;border-top:1px solid var(--border);text-align:center;font-size:9px;color:var(--text3);margin-top:auto}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--rs);font-family:"Tajawal",sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--navy);color:white}.btn-primary:hover:not(:disabled){background:var(--navy-dark)}
.btn-outline{background:white;color:var(--navy);border:2px solid var(--navy)}.btn-outline:hover:not(:disabled){background:var(--navy-lighter)}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover:not(:disabled){background:var(--border)}
.btn-green{background:var(--green);color:white}.btn-green:hover:not(:disabled){background:var(--green-dark)}
.btn-red{background:var(--red);color:white}.btn-red:hover:not(:disabled){background:var(--red-dark)}
.btn-block{width:100%}.btn-sm{padding:6px 12px;font-size:11px;border-radius:var(--rx)}.btn-lg{padding:12px 28px;font-size:15px;border-radius:var(--r)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* FORMS */
.fg{margin-bottom:11px}.fl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.fi{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);font-family:"Tajawal",sans-serif;font-size:13px;color:var(--text);outline:none;transition:.2s}
.fi:focus{border-color:var(--navy);background:white}.fi::placeholder{color:var(--text3)}
select.fi{cursor:pointer}

/* HOME */
.home-body{flex:1;padding-top:56px}
.hero{background:var(--navy);padding:48px 18px 36px;text-align:center;position:relative;overflow:hidden}
.hero-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
.hero-content{position:relative;z-index:2}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:100px;padding:4px 11px;font-size:10px;font-weight:700;color:rgba(255,255,255,.78);margin-bottom:16px;animation:fU .5s ease both}
.hero-logo{font-family:"Noto Naskh Arabic",serif;font-size:clamp(68px,15vw,108px);font-weight:900;color:white;line-height:1;animation:fU .5s .05s ease both}
.hero-logo-en{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.28);font-weight:600;display:block;margin-top:4px;text-transform:uppercase;animation:fU .5s .1s ease both}
.hero-tag{font-size:clamp(14px,3vw,20px);font-weight:800;color:var(--gold);margin:14px 0 8px;animation:fU .5s .15s ease both}
.hero-desc{font-size:13px;color:rgba(255,255,255,.6);max-width:320px;margin:0 auto 24px;line-height:1.9;animation:fU .5s .2s ease both}
.hero-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;animation:fU .5s .25s ease both}
.hbtn{display:inline-flex;align-items:center;gap:6px;padding:12px 22px;border-radius:var(--rs);font-family:"Tajawal",sans-serif;font-size:14px;font-weight:800;cursor:pointer;border:none;box-shadow:0 4px 14px rgba(0,0,0,.15);transition:.2s;background:white;color:var(--navy)}
.hbtn:hover{transform:translateY(-2px)}
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);background:white;border-bottom:1px solid var(--border)}
.stat-box{padding:16px 8px;text-align:center;border-left:1px solid var(--border)}.stat-box:last-child{border-left:none}
.stat-num{font-size:clamp(16px,4vw,22px);font-weight:900;color:var(--navy);margin-bottom:2px;line-height:1.1}
.stat-lbl{font-size:9px;color:var(--text2);font-weight:600;line-height:1.4}
.sec{padding:44px 16px;max-width:880px;margin:0 auto}
.sec-eye{font-size:9px;font-weight:700;color:var(--navy);letter-spacing:3px;text-align:center;margin-bottom:4px;opacity:.6;text-transform:uppercase}
.sec-title{font-size:clamp(15px,3vw,20px);font-weight:800;color:var(--navy);text-align:center;margin-bottom:5px}
.sec-sub{text-align:center;font-size:12px;color:var(--text2);margin-bottom:22px}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:11px}
.feat-card{border-radius:var(--r);padding:18px 15px;transition:.25s;border:1px solid transparent}
.feat-card:nth-child(1){background:white;border-color:var(--border)}
.feat-card:nth-child(2){background:var(--orange-light);border-color:rgba(224,92,0,.12)}
.feat-card:nth-child(3){background:var(--yellow-light);border-color:rgba(202,138,4,.12)}
.feat-card:nth-child(4){background:var(--gray-light);border-color:rgba(107,114,128,.12)}
.feat-card:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.feat-ic{width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.feat-title{font-size:13px;font-weight:800;margin-bottom:3px;color:var(--navy)}
.feat-desc{font-size:11px;color:var(--text2);line-height:1.7}
.how{background:white;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:44px 16px}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:16px;max-width:700px;margin:0 auto}
.step{text-align:center}
.step-num{width:40px;height:40px;background:var(--navy);color:white;border-radius:50%;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 9px}
.step-title{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:3px}
.step-desc{font-size:10px;color:var(--text2);line-height:1.6}
.cta{background:var(--navy);padding:40px 18px;text-align:center;position:relative;overflow:hidden}
.cta::before{content:"مقام";font-family:"Noto Naskh Arabic",serif;position:absolute;font-size:120px;font-weight:900;color:rgba(255,255,255,.04);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
.cta-title{font-size:clamp(14px,3vw,20px);font-weight:800;color:white;margin-bottom:5px;position:relative;z-index:1}
.cta-sub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:16px;position:relative;z-index:1}
.cta-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;background:white;color:var(--navy);border-radius:var(--rs);font-family:"Tajawal",sans-serif;font-size:13px;font-weight:800;cursor:pointer;border:none;transition:.2s;position:relative;z-index:1}
.cta-btn:hover{transform:translateY(-2px)}
footer{background:white;border-top:1px solid var(--border);padding:12px 18px;text-align:center;font-size:10px;color:var(--text3);line-height:2}
footer a{color:var(--text3);text-decoration:none}

/* ABOUT */
.about-body{flex:1;padding-top:56px}
.about-hero{background:var(--navy);padding:44px 18px 36px;text-align:center;position:relative;overflow:hidden}
.about-hero::before{content:"مقام";font-family:"Noto Naskh Arabic",serif;position:absolute;font-size:150px;font-weight:900;color:rgba(255,255,255,.03);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
.about-hero-title{font-size:clamp(17px,4vw,24px);font-weight:800;color:white;margin-bottom:6px;position:relative;z-index:1}
.about-hero-sub{font-size:12px;color:rgba(255,255,255,.6);position:relative;z-index:1;max-width:360px;margin:0 auto;line-height:1.9}
.about-sec{max-width:680px;margin:0 auto;padding:32px 18px}
.about-card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.about-card-title{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.about-card-text{font-size:12px;color:var(--text2);line-height:2}
.about-goals{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-top:10px}
.about-goal{background:var(--navy-lighter);border-radius:var(--rs);padding:11px;text-align:center}
.about-goal-ic{font-size:20px;margin-bottom:4px}
.about-goal-text{font-size:11px;font-weight:700;color:var(--navy)}

/* LOGIN */
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:70px 16px 32px;background:var(--bg)}
.login-box{width:100%;max-width:370px;background:white;border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--sh2);animation:fU .4s ease}
.login-logo{text-align:center;margin-bottom:12px}
.login-logo-ar{font-family:"Noto Naskh Arabic",serif;font-size:24px;font-weight:900;color:var(--navy);line-height:1.1}
.login-logo-en{font-size:7px;letter-spacing:4px;color:var(--text3);text-transform:uppercase}
.login-tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:16px;background:var(--surface);padding:4px;border-radius:var(--rs)}
.login-tab{padding:8px;border-radius:var(--rx);border:none;background:transparent;font-family:"Tajawal",sans-serif;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:.18s}
.login-tab.active{background:var(--navy);color:white}
.login-demo{margin-top:10px;padding:8px 10px;background:var(--bg);border:1px dashed var(--border);border-radius:7px;font-size:10px;color:var(--text3);line-height:2}

/* STUDENT DASH */
.dash-body{flex:1;padding:64px 13px 30px;max-width:600px;margin:0 auto;width:100%}
.sec-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px;background:white;padding:4px;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
.sec-tab{padding:8px;border-radius:var(--rs);border:none;background:transparent;font-family:"Tajawal",sans-serif;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:.18s}
.sec-tab.active{background:var(--navy);color:white}
.sec-tab.active.ac-tab{background:var(--cyan)}
.date-bar{background:white;border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.date-day{font-size:14px;font-weight:800}.date-full{font-size:10px;color:var(--text2);margin-top:1px}
.wk-range{background:var(--navy-lighter);color:var(--navy);padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700}
.wk-card{background:var(--navy);border-radius:var(--r);padding:14px;margin-bottom:9px;box-shadow:0 4px 16px rgba(26,47,94,.17);position:relative;overflow:hidden}
.wk-card::before{content:"";position:absolute;top:-20px;left:-20px;width:80px;height:80px;background:rgba(255,255,255,.04);border-radius:50%}
.wk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.wk-title{font-size:11px;font-weight:700;color:white}
.wk-acts{display:flex;align-items:center;gap:5px}
.wk-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.16);padding:2px 7px;border-radius:100px}
.wk-anal{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.days-row{display:flex;gap:3px;margin-bottom:9px}
.day-pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:7px;border:1.5px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04)}
.day-pill.done{background:rgba(21,128,61,.3);border-color:rgba(21,128,61,.6)}
.day-pill.today{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.55)}
.day-pill.missed{background:rgba(185,28,28,.16);border-color:rgba(185,28,28,.35)}
.day-pill.locked{opacity:.2}
.day-name{font-size:8px;font-weight:700;color:rgba(255,255,255,.6)}.day-ic{font-size:11px}
.wk-prog{display:flex;align-items:center;gap:6px}
.wk-bar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden}
.wk-bar-fill{height:100%;background:rgba(255,255,255,.6);border-radius:100px;transition:width .5s ease}
.wk-pct{font-size:9px;color:rgba(255,255,255,.55);font-weight:700;min-width:22px;text-align:left}
.action-cards{display:flex;flex-direction:column;gap:7px}
.ac{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.ac:hover:not(.disabled){border-color:var(--navy);box-shadow:var(--sh2);transform:translateX(-2px)}
.ac.disabled{opacity:.44;cursor:not-allowed}
.ac-ic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ic-navy{background:var(--navy-lighter)}.ic-green{background:var(--green-light)}.ic-gold{background:var(--gold-light)}
.ac-body{flex:1}.ac-title{font-size:12px;font-weight:700;margin-bottom:2px}.ac-desc{font-size:10px;color:var(--text2)}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap}
.b-navy{background:var(--navy-lighter);color:var(--navy)}.b-green{background:var(--green-light);color:var(--green-dark)}
.b-amber{background:var(--gold-light);color:#7a4f0a}.b-red{background:var(--red-light);color:var(--red-dark)}
.ac-arr{color:var(--text3);font-size:12px}

/* QUESTIONS */
.q-body{flex:1;padding:64px 13px 30px;max-width:600px;margin:0 auto;width:100%}
.timer-bar{background:var(--red-light);border:1px solid #fca5a5;border-radius:var(--rs);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.timer-lbl{font-size:10px;color:var(--text2);font-weight:600}
.timer-val{font-size:16px;font-weight:900;color:var(--red);font-variant-numeric:tabular-nums}
.timer-val.warn{animation:bl 1s ease infinite}
.q-hdr{margin-bottom:11px}
.q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.q-lbl{font-size:10px;font-weight:700;color:var(--text2)}.q-cnt{font-size:10px;font-weight:700;color:var(--navy)}
.q-bar{height:4px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:5px}
.q-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .3s}

.modal{background:white;border-radius:18px;padding:24px;max-width:340px;width:100%;box-shadow:var(--sh3);animation:fU .25s ease;text-align:center}

.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.7}.modal-btns{display:flex;gap:7px}
.toast-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center}
.toast{padding:8px 16px;border-radius:var(--rs);font-size:12px;font-weight:600;animation:fU .25s ease;white-space:nowrap;box-shadow:var(--sh2)}
.t-ok{background:var(--green-light);border:1px solid #86efac;color:var(--green-dark)}
.t-err{background:var(--red-light);border:1px solid #fca5a5;color:var(--red-dark)}
.db-badge{position:fixed;bottom:12px;right:12px;z-index:100;font-size:9px;font-weight:700;padding:4px 9px;border-radius:100px;border:1px solid var(--border);background:white;color:var(--text3);display:flex;align-items:center;gap:4px}
.db-dot{width:5px;height:5px;border-radius:50%;background:#ccc}
.db-dot.ok{background:var(--green)}.db-dot.err{background:var(--red)}.db-dot.loading{background:var(--gold);animation:bl 1s ease infinite}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:sp .7s linear infinite}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-navy{color:var(--navy)}
.pg-empty{padding:32px;text-align:center;color:var(--text3);font-size:12px}
@media(max-width:480px){
.stats-strip{grid-template-columns:repeat(2,1fr)}
.stats-strip .stat-box:nth-child(2){border-left:none}
.stats-strip .stat-box:nth-child(3){border-top:1px solid var(--border)}
.stats-strip .stat-box:nth-child(4){border-top:1px solid var(--border);border-left:1px solid var(--border)}
.q-text{font-size:14px}.opt-text{font-size:12px}
.form-row{grid-template-columns:1fr}}

async function sb(table,method="GET",body=null,query=""){
  const o={method,headers:{"Content-Type":"application/json","Authorization":`Bearer ${SB_KEY}`,"apikey":SB_KEY,"Prefer":method==="POST"?"return=representation":method==="PATCH"?"return=representation":""}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(`${SB_URL}/rest/v1/${table}${query}`,o);
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):[];
}

async function sbCount(table,query=""){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?select=count${query}`,{headers:{"Authorization":`Bearer ${SB_KEY}`,"apikey":SB_KEY,"Prefer":"count=exact"}});
  const h=r.headers.get("content-range");
  return h?parseInt(h.split("/")[1])||0:0;
}

function wkKey(){const n=new Date(),s=new Date(n.getFullYear(),0,1);return n.getFullYear()+"_W"+Math.ceil((n-s)/604800000)+"_"+S.sec;}

async function fillWkCard(){
  const done=await getProgress();
  const keys=["sun","mon","tue","wed","thu"],names=["أحد","اثنين","ثلاثاء","أربعاء","خميس"];
  const today=new Date().getDay(),isTrial=S.user?.type==="guest";
  document.getElementById("wkT").textContent=`ابدأ التدريب الأسبوعي — ${S.sec==="abilities"?"القدرات":"التحصيلي"}`;
  const row=document.getElementById("daysRow");row.innerHTML="";
  keys.forEach((k,i)=>{
    let cls="day-pill",ic="○";
    if(done[k]){cls+=" done";ic="✅";}
    else if(isTrial){cls+=" today";ic="📝";}
    else if(i===today&&today<5){cls+=" today";ic="📝";}
    else if(i<today&&today<5){cls+=" missed";ic="❌";}
    else{cls+=" locked";ic="🔒";}
    row.innerHTML+=`<div class="${cls}"><span class="day-name">${names[i]}</span><span class="day-ic">${ic}</span></div>`;
  });
  const dc=keys.filter(k=>done[k]).length,pct=Math.round((dc/5)*100);
  document.getElementById("wkB").textContent=`${dc}/5`;
  document.getElementById("wkBF").style.width=pct+"%";
  document.getElementById("wkBP").textContent=pct+"%";
}

const shuf=a=>[...a].sort(()=>Math.random()-.5);

async function fetchQs(section,limit=10){

  catch(e){toast("خطأ في جلب الأسئلة","err");return[];}
}

async function buildMixed(n,sec){
  if(sec==="abilities"){const h=Math.floor(n/2);const[q,v]=await Promise.all([fetchQs("abilities_q",h),fetchQs("abilities_v",n-h)]);return shuf([...q,...v]);}
  const[m,p,c,b]=await Promise.all([fetchQs("academic_math",Math.ceil(n/4)),fetchQs("academic_phys",Math.ceil(n/4)),fetchQs("academic_chem",Math.ceil(n/4)),fetchQs("academic_bio",Math.floor(n/4))]);
  return shuf([...m,...p,...c,...b]).slice(0,n);
}

function secLabel(q){const m={"abilities_q":"📐 كمي","abilities_v":"📝 لفظي","academic_math":"🔢 رياضيات","academic_phys":"⚡ فيزياء","academic_chem":"🧪 كيمياء","academic_bio":"🧬 أحياء"};return`${m[q.section]||"🎯"} — ${q.skill}`;}

function loadQ(){
  const q=S.qs[S.idx],tot=S.qs.length;
  document.getElementById("qCnt").textContent=`${S.idx+1}/${tot}`;
  document.getElementById("qBF").style.width=Math.round((S.idx/tot)*100)+"%";

  document.getElementById("opts").innerHTML=opts.map((o,i)=>`<button class="opt" onclick="pick(${i})"><span class="opt-letter">${L[i]}</span><span class="opt-text">${o}</span><span class="opt-ric" id="oic${i}"></span></button>`).join("");

function pick(i){if(S.answered)return;S.selected=i;document.querySelectorAll(".opt").forEach((b,idx)=>b.classList.toggle("selected",idx===i));document.getElementById("confBtn").className="confirm-btn active";}

function confirmAns(){
  if(S.answered||S.selected===null)return;
  S.answered=true;const i=S.selected,q=S.qs[S.idx];S.ans[S.idx]=i;
  const btns=document.querySelectorAll(".opt");btns.forEach(b=>b.disabled=true);
  btns[i].classList.remove("selected");btns[i].classList.add(i===q.ans?"correct":"wrong");
  document.getElementById(`oic${i}`).textContent=i===q.ans?"✓":"✗";
  if(i!==q.ans){btns[q.ans].classList.add("correct");document.getElementById(`oic${q.ans}`).textContent="✓";}
  document.getElementById("qBF").style.width=Math.round(((S.idx+1)/S.qs.length)*100)+"%";
  if(S.settings.exp!==false){document.getElementById("expText").textContent=q.exp||"";document.getElementById("expBox").classList.add("show");if(window.MathJax?.typesetPromise)MathJax.typesetPromise([document.getElementById("expBox")]).catch(()=>{});}
  document.getElementById("confBtn").style.display="none";document.getElementById("nextBtn").className="next-btn active";
}

async function finishSession(){
  clearInterval(S.timer);
  const tot=S.qs.length,cor=S.qs.filter((q,i)=>S.ans[i]===q.ans).length,pct=Math.round((cor/tot)*100),prev=S.sessionType;
  S.sessionType="";
  if(S.user?.type==="student"){
    const sd={student_id:S.user.id,section:S.sec,type:prev,score:pct,correct:cor,total:tot,week_key:wkKey(),day_key:prev==="daily"?todayKey():null,questions:S.qs.map((q,idx)=>({id:q.id,skill:q.skill,correct:S.ans[idx]===q.ans}))};
    try{await sb("sessions","POST",sd);}
    catch(e){const lk=`mq_sessions_${S.user.id}`;const h=JSON.parse(localStorage.getItem(lk)||"[]");h.unshift({...sd,date:new Date().toISOString()});if(h.length>60)h.pop();localStorage.setItem(lk,JSON.stringify(h));}

  const[t,s]=pct>=85?["🏆 ممتاز!","أداء رائع"]:pct>=70?["👍 جيد جداً!","نتيجة جيدة"]:pct>=50?["💪 جيد!","واصل التدريب"]:["📚 واصل!","لكل مجتهد مقام"];
  document.getElementById("sPct").textContent=pct+"%";
  document.getElementById("resC").textContent=cor;
  document.getElementById("resW").textContent=tot-cor;
  document.getElementById("resTot").textContent=tot;
  document.getElementById("scoreArc").style.strokeDashoffset=307.9-(pct/100)*307.9;
  document.getElementById("resT").textContent=t;document.getElementById("resS").textContent=s;
  const lm=pct>=85?"مستواك ممتاز! أداؤك يتجاوز معظم الطلاب. واصل هذا المستوى.":pct>=70?"مستواك جيد جداً. بقليل من التدريب الإضافي ستصل للمستوى الممتاز.":pct>=50?"مستواك متوسط. ركّز على المهارات الضعيفة عبر التدريب الإضافي.":"تحتاج لمزيد من التدريب. لا تستسلم — كل طالب مجتهد يصل لهدفه!";
  document.getElementById("resLevel").style.display="";document.getElementById("resLevelText").textContent=lm;
  document.getElementById("resQsPanel").innerHTML=S.qs.map((q,idx)=>{const ok=S.ans[idx]===q.ans;const opts=Array.isArray(q.opts)?q.opts:JSON.parse(q.opts||"[]");return`<div class="res-q-item"><div class="res-q-ic">${ok?"✅":"❌"}</div><div class="res-q-info"><div class="res-q-text">${q.text}</div><div class="res-q-skill">${secLabel(q)} | الإجابة: ${opts[q.ans]||""}</div></div></div>`;}).join("");
  document.getElementById("resQsPanel").classList.remove("open");
  showPage("resPage");

async function buildAnalysis(){
  const hist=await getHist(S.sec);
  document.getElementById("anSub").textContent=`تحليل أدائك في ${S.sec==="abilities"?"القدرات":"التحصيلي"}`;
  const ts=hist.length,avg=ts?Math.round(hist.reduce((a,b)=>a+(b.score||0),0)/ts):0;
  const tq=hist.reduce((a,b)=>a+(b.total||0),0),tc=hist.reduce((a,b)=>a+(b.correct||0),0);
  document.getElementById("ovCards").innerHTML=`<div class="ov-card"><div class="ov-val">${ts}</div><div class="ov-lbl">جلسة</div></div><div class="ov-card"><div class="ov-val">${avg}%</div><div class="ov-lbl">متوسط</div></div><div class="ov-card"><div class="ov-val">${tq}</div><div class="ov-lbl">سؤال</div></div><div class="ov-card"><div class="ov-val">${tc}</div><div class="ov-lbl">صحيح</div></div>`;
  const ss={};hist.forEach(s=>{const qs=Array.isArray(s.questions)?s.questions:JSON.parse(s.questions||"[]");qs.forEach(q=>{if(!ss[q.skill])ss[q.skill]={c:0,t:0};ss[q.skill].t++;if(q.correct)ss[q.skill].c++;});});
  const groups=S.sec==="abilities"?{"كمي":"abilities_q","لفظي":"abilities_v"}:{"رياضيات":"academic_math","فيزياء":"academic_phys","كيمياء":"academic_chem","أحياء":"academic_bio"};

  const cd=Object.entries(groups).map(([name])=>{const skls=Object.keys(ss);const tct=skls.reduce((a,sk)=>a+(ss[sk]?.c||0),0),ttt=skls.reduce((a,sk)=>a+(ss[sk]?.t||0),0);return{name,pct:ttt?Math.round((tct/ttt)*100):0};}).filter(d=>d.pct>0);
  const cc=document.getElementById("chartCard");
  if(cd.length){cc.style.display="block";document.getElementById("mainChart").innerHTML=cd.map(d=>`<div class="bar-row"><div class="bar-lbl">${d.name}</div><div class="bar-track"><div class="bar-fill ${lvl(d.pct).c}" style="width:${d.pct}%"></div></div><div class="bar-pct">${d.pct}%</div></div>`).join("");}
  else cc.style.display="none";
  if(!Object.keys(ss).length){document.getElementById("subjCards").innerHTML='<div class="pg-empty">أكمل تدريبات أولاً لرؤية التحليل</div>';return;}
  document.getElementById("subjCards").innerHTML=Object.entries(groups).map(([name])=>{
    const skls=Object.keys(ss).map(sk=>({skill:sk,...ss[sk]})),tct=skls.reduce((a,b)=>a+b.c,0),ttt=skls.reduce((a,b)=>a+b.t,0),pct=ttt?Math.round((tct/ttt)*100):0;
    const{l,lv}=lvl(pct);

    return`<div class="subj-card" id="sc_${name}"><div class="subj-head" onclick="this.closest('.subj-card').classList.toggle('open')"><div class="subj-ic">${ics[name]||"📚"}</div><div class="subj-info"><div class="subj-name">${name}</div><div class="subj-meta">${ttt} سؤال — ${tct} صحيح</div></div><span class="subj-lvl ${lv}">${l}</span><span class="subj-chev">›</span></div><div class="subj-skills">${skH||'<div style="color:var(--text3);font-size:11px">لا توجد بيانات</div>'}</div></div>`;

async function buildReports(){
  const hist=await getHist(S.sec);
  const last8=[...hist].slice(0,8).reverse();
  document.getElementById("wkBars").innerHTML=last8.length?last8.map(s=>{const h=Math.max(3,Math.round((s.score/100)*60));const col=s.score>=80?"var(--green)":s.score>=50?"var(--navy)":"var(--red)";const dt=s.created_at||s.date||"";const lbl=dt?new Date(dt).toLocaleDateString("ar",{month:"numeric",day:"numeric"}):"";return`<div class="wk-bar-item"><div class="wk-bar-v">${s.score}%</div><div class="wk-bar-f" style="height:${h}px;background:${col}"></div><div class="wk-bar-lb">${lbl}</div></div>`;}).join(""):'<div class="pg-empty">لا توجد بيانات</div>';
  const today=new Date(),dots=[];
  for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);const ds=d.toISOString().slice(0,10);const done=hist.some(s=>(s.created_at||s.date||"").slice(0,10)===ds);dots.push(`<div class="streak-dot ${i===0?"sd-today":done?"sd-done":"sd-miss"}">${i===0?"●":done?"✓":"·"}</div>`);}
  document.getElementById("streakRow").innerHTML=dots.join("");
  const tS=hist.length,avgS=tS?Math.round(hist.reduce((a,b)=>a+(b.score||0),0)/tS):0,tQ=hist.reduce((a,b)=>a+(b.total||0),0),tC=hist.reduce((a,b)=>a+(b.correct||0),0);
  document.getElementById("rpStats").innerHTML=`<div class="rp-stat"><div class="rp-stat-val">${tS}</div><div class="rp-stat-lbl">جلسات</div></div><div class="rp-stat"><div class="rp-stat-val">${avgS}%</div><div class="rp-stat-lbl">متوسط</div></div><div class="rp-stat"><div class="rp-stat-val">${tQ}</div><div class="rp-stat-lbl">أسئلة</div></div><div class="rp-stat"><div class="rp-stat-val">${tQ?Math.round((tC/tQ)*100):0}%</div><div class="rp-stat-lbl">صحة</div></div>`;
  const ss={};hist.forEach(s=>{const qs=Array.isArray(s.questions)?s.questions:JSON.parse(s.questions||"[]");qs.forEach(q=>{if(!ss[q.skill])ss[q.skill]={c:0,t:0};ss[q.skill].t++;if(q.correct)ss[q.skill].c++;});});
  const weak=Object.entries(ss).map(([skill,d])=>({skill,pct:Math.round((d.c/d.t)*100)})).filter(x=>x.pct<70).sort((a,b)=>a.pct-b.pct).slice(0,5);
  document.getElementById("weakList").innerHTML=weak.length?weak.map(w=>`<div class="weak-row"><div class="weak-name">${w.skill}</div><div class="bar-track" style="flex:1"><div class="bar-fill fill-weak" style="width:${w.pct}%"></div></div><div class="weak-pct">${w.pct}%</div></div>`).join(""):'<div class="pg-empty">لا توجد مهارات ضعيفة 🎉</div>';
}

async function renderStdTbl(stds,id,withDel=false){
  const el=document.getElementById(id);
  if(!stds.length){el.innerHTML='<div class="pg-empty">لا يوجد طلاب</div>';return;}
  const rows=await Promise.all(stds.map(async s=>{
    let done=0,last="—";
    try{const ss=await sb("sessions","GET",null,`?student_id=eq.${s.id}&type=eq.daily&week_key=eq.${wkKey()}&select=day_key`);done=ss.length;const h=await sb("sessions","GET",null,`?student_id=eq.${s.id}&order=created_at.desc&limit=1&select=score`);if(h.length)last=h[0].score+"%";}catch(e){}
    const[pc,pt]=done===5?["pill-green","مكتمل"]:done>0?["pill-amber","جارٍ"]:["pill-red","لم يبدأ"];
    return`<div class="tbl-tr"><div class="c-name">${s.name}</div><div class="c-id">${s.id}</div><div class="c-days">${done}/5</div><div class="c-score">${last}</div><div class="c-status"><span class="pill ${pc}">${pt}</span></div><div class="c-act">${withDel?`<button class="del-btn" onclick="deleteStudent('${s.id}')">حذف</button>`:""}</div></div>`;
  }));
  el.innerHTML=rows.join("");
}

function renderTchTbl(tchs,id,withDel=false){

}

async function calcSchStats(stds){
  let act=0,scores=[],exm=0;
  await Promise.all(stds.map(async s=>{try{const ss=await sb("sessions","GET",null,`?student_id=eq.${s.id}&week_key=eq.${wkKey()}&select=type,score`);if(ss.length)act++;ss.forEach(r=>scores.push(r.score));if(ss.some(r=>r.type==="exam"))exm++;}catch(e){};}));
  document.getElementById("sAct").textContent=act;
  document.getElementById("sAvg").textContent=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)+"%":"—";
  document.getElementById("sExm").textContent=exm;
}

async function saveQuestion(){
  const eid=document.getElementById("editQId").value,section=document.getElementById("qSec").value,skill=document.getElementById("qSkill").value.trim(),text=document.getElementById("qTextInput").value.trim(),optsRaw=document.getElementById("qOpts").value.trim(),ans=parseInt(document.getElementById("qAns").value),exp=document.getElementById("qExp").value.trim();

  const opts=optsRaw.split("\n").map(o=>o.trim()).filter(Boolean);
  if(opts.length<2){toast("يجب وجود خيارين على الأقل","err");return;}
  if(isNaN(ans)||ans<0||ans>=opts.length){toast("رقم الإجابة غير صحيح","err");return;}
  const data={section,skill,text,opts,ans,exp};
  try{
    if(eid){await sb("questions","PATCH",data,`?id=eq.${eid}`);toast("✓ تم التعديل","ok");}
    else{data.id="q_"+section+"_"+Date.now();await sb("questions","POST",data);toast("✓ تم الإضافة","ok");}
    closeM("addQM");loadQBank();loadAdDash();
  }catch(e){toast("خطأ في الحفظ","err");}
}

  try{
    const rpts=await sb("reports","GET",null,"?order=created_at.desc&limit=50");
    document.getElementById("tblRpts").innerHTML=rpts.length?rpts.map(r=>`<div class="tbl-tr" style="font-size:11px;align-items:flex-start;padding:12px 15px;gap:10px"><div style="flex:3"><div style="font-weight:600;margin-bottom:3px">${(r.question_text||"").substring(0,60)}...</div>${r.note?`<div style="color:var(--text3);font-size:10px">${r.note}</div>`:""}</div><div style="flex:1;color:var(--red);font-weight:700">${r.type}</div><div style="flex:1;color:var(--text3)">${r.created_at?new Date(r.created_at).toLocaleDateString("ar"):""}</div><div style="display:flex;gap:5px;flex-shrink:0">${r.question_id?`<button class="edit-btn" onclick="editQFromReport('${r.question_id}')">تعديل السؤال</button>`:""}<button class="del-btn" onclick="deleteReport('${r.id}')">حذف البلاغ</button></div></div>`).join(""):'<div class="pg-empty">لا توجد بلاغات</div>';
  }catch(e){}
}

async function editQFromReport(qId){try{const rows=await sb("questions","GET",null,`?id=eq.${qId}&limit=1`);if(!rows.length){toast("السؤال غير موجود","err");return;}qBankData=[rows[0],...qBankData];editQuestion(qId);}catch(e){toast("خطأ","err");}}
async function deleteReport(id){try{await sb("reports","DELETE",null,`?id=eq.${id}`);toast("✓ تم الحذف","ok");loadAdReports();loadAdDash();}catch(e){toast("خطأ","err");}}

/* HELPERS */
function closeM(id){document.getElementById(id).classList.remove("open");}
function showTrial(){document.getElementById("trialM").classList.add("open");}
function exitSession(){closeM("exitM");clearInterval(S.timer);S.sessionType="";goDash();}
function showConfirm(title,sub,onOk){document.getElementById("confirmTitle").textContent=title;document.getElementById("confirmSub").textContent=sub;document.getElementById("confirmOkBtn").onclick=onOk;document.getElementById("confirmM").classList.add("open");}
function toast(msg,type="ok"){const w=document.getElementById("toastWrap"),el=document.createElement("div");el.className=`toast t-${type}`;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),3000);}

window.addEventListener("DOMContentLoaded",init);
